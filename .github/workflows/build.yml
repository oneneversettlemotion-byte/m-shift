name: Build M-SHIFT

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 也支持在 GitHub 网页手动触发

jobs:
  # ─── macOS 打包 ───────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 打包 macOS DMG
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap

  # ─── Windows 打包 ─────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 打包 Windows NSIS 安装包
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap

  # ─── 发布到 GitHub Releases ───────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 下载 macOS 产物
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts/win

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          name: M-SHIFT ${{ github.ref_name }}
          body: |
            ## M-SHIFT ${{ github.ref_name }}

            ### 下载
            - 🍎 **macOS**：下载 `.dmg` 文件，双击安装
            - 🪟 **Windows**：下载 `.exe` 文件，双击安装
          files: |
            artifacts/mac/*.dmg
            artifacts/mac/*.zip
            artifacts/win/*.exe
            artifacts/win/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
